server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: property-management
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/property_management?useSSL=false&useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2B8
    username: root
    password: 203122
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
        reset-enable: false

  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 文件上传配置
file:
  upload:
    path: D:/uploads/
    url-prefix: http://localhost:8081/api/file/

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.property.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: property-management-secret-key-2023
  expiration: 604800 # 7天，单位秒
  header: Authorization
  prefix: Bearer

# AI配置
ai:
  openai:
    enabled: true  # 已启用AI功能
    api-key: ${OPENAI_API_KEY:62abb713-752c-4b9f-be2e-9d05333a7cf8}
    base-url: ${OPENAI_BASE_URL:https://ark.cn-beijing.volces.com/api/v3/chat/completions}
    model: ${OPENAI_MODEL:doubao-1-5-thinking-vision-pro-250428}
    timeout: 60
    temperature: 0.7
    max-tokens: 1000

# 日志配置
logging:
  level:
    com.property: debug
    org.springframework.security: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
  file:
    name: logs/property-management.log

# Swagger配置
swagger:
  enabled: true
  title: 物业管理系统API文档
  description: 物业管理系统后端接口文档
  version: 1.0.0
  base-package: com.property.controller

# 解决SpringFox与Spring Boot兼容性问题
springfox:
  documentation:
    swagger-ui:
      enabled: true
